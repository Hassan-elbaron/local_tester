# AI Marketing OS - Configuration File (v4)
# This is the main configuration file for the system

name: AI Marketing OS
version: 4.0.0
description: Production-Ready AI Marketing Platform

# ============================================================
# AGENTS CONFIGURATION
# ============================================================
agents:
  strategy:
    enabled: true
    model_type: auto
    priority: 1
    timeout: 30.0
    retry_attempts: 3
    fallback_enabled: true
    description: Strategy Agent - يطور استراتيجية التسويق
    parameters:
      max_iterations: 5
      temperature: 0.7
      analysis_depth: deep

  content:
    enabled: true
    model_type: cloud
    priority: 2
    timeout: 45.0
    retry_attempts: 3
    fallback_enabled: true
    description: Content Agent - ينتج المحتوى التسويقي
    parameters:
      tone: professional
      max_length: 2000
      style: engaging

  research:
    enabled: true
    model_type: local
    priority: 3
    timeout: 60.0
    retry_attempts: 2
    fallback_enabled: true
    description: Research Agent - يبحث عن البيانات
    parameters:
      depth: deep
      sources: 5
      market_focus: true

  campaign:
    enabled: true
    model_type: auto
    priority: 2
    timeout: 30.0
    retry_attempts: 3
    fallback_enabled: true
    description: Campaign Agent - يخطط الحملة
    parameters:
      duration_weeks: 4
      budget_optimization: true

  analytics:
    enabled: true
    model_type: local
    priority: 4
    timeout: 20.0
    retry_attempts: 2
    fallback_enabled: false
    description: Analytics Agent - يحسب KPIs
    parameters:
      metrics: [reach, engagement, conversion, roi]
      reporting_frequency: daily

  compliance:
    enabled: true
    model_type: local
    priority: 5
    timeout: 15.0
    retry_attempts: 1
    fallback_enabled: false
    description: Compliance Agent - يراجع الامتثال
    parameters:
      check_regulations: true
      check_brand_guidelines: true

  budget:
    enabled: true
    model_type: local
    priority: 3
    timeout: 25.0
    retry_attempts: 2
    fallback_enabled: true
    description: Budget Agent - يخصص الميزانية
    parameters:
      optimization_level: high
      reallocation_enabled: true

# ============================================================
# MODELS CONFIGURATION
# ============================================================
models:
  gpt4:
    type: cloud
    enabled: true
    priority: 1
    timeout: 30.0
    retry_attempts: 3
    fallback_model: mistral
    parameters:
      temperature: 0.7
      max_tokens: 2000
      top_p: 0.9

  mistral:
    type: local
    enabled: true
    priority: 2
    timeout: 20.0
    retry_attempts: 2
    fallback_model: null
    parameters:
      temperature: 0.5
      max_tokens: 1500
      top_p: 0.8

  claude:
    type: cloud
    enabled: false
    priority: 3
    timeout: 35.0
    retry_attempts: 3
    fallback_model: gpt4
    parameters:
      temperature: 0.6
      max_tokens: 2500

# ============================================================
# ORCHESTRATOR CONFIGURATION
# ============================================================
orchestrator:
  execution_mode: concurrent  # sequential, parallel, concurrent, hybrid
  max_concurrent_agents: 5
  timeout: 120.0
  decision_strategy: hybrid  # weighted, normalized, percentile, hybrid
  enable_jury_system: true
  jury_threshold: 0.7

# ============================================================
# DECISION ENGINE CONFIGURATION
# ============================================================
decision_engine:
  scoring_strategy: hybrid
  enable_confidence_scoring: true
  enable_ranking: true
  
  criteria:
    relevance:
      weight: 1.5
      importance: critical
    effectiveness:
      weight: 1.3
      importance: high
    cost:
      weight: 1.0
      importance: high
    feasibility:
      weight: 1.2
      importance: high
    scalability:
      weight: 0.8
      importance: medium

# ============================================================
# MEMORY CONFIGURATION
# ============================================================
memory:
  session_ttl: 3600  # seconds
  storage_dir: ./storage
  database_path: ./ai_marketing_os.db
  enable_persistence: true
  enable_campaign_history: true
  history_retention_days: 90
  
  cache:
    enable_caching: true
    cache_ttl: 1800  # seconds
    max_cache_size: 1000  # MB

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: detailed  # simple, detailed, json
  output: both  # console, file, both
  log_file: ./logs/ai_marketing_os.log
  
  tracing:
    enable_tracing: true
    enable_timing: true
    enable_detailed_logs: true
  
  rotation:
    max_bytes: 10485760  # 10 MB
    backup_count: 5

# ============================================================
# API CONFIGURATION
# ============================================================
api:
  enabled: true
  host: 0.0.0.0
  port: 8000
  debug: false
  
  cors:
    enabled: true
    allow_origins: ["*"]
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]
  
  rate_limiting:
    enabled: true
    requests_per_minute: 100
    requests_per_hour: 5000
  
  authentication:
    enabled: false
    type: bearer  # bearer, api_key, oauth2
    secret_key: your-secret-key-here

# ============================================================
# OBSERVABILITY CONFIGURATION
# ============================================================
observability:
  enable_tracing: true
  enable_metrics: true
  enable_profiling: false
  
  metrics:
    collect_execution_time: true
    collect_memory_usage: true
    collect_error_rates: true
  
  export:
    enabled: false
    format: prometheus  # prometheus, json
    endpoint: http://localhost:9090

# ============================================================
# ERROR HANDLING CONFIGURATION
# ============================================================
error_handling:
  enable_circuit_breaker: true
  circuit_breaker_threshold: 5
  circuit_breaker_timeout: 60  # seconds
  
  retry_policy:
    enable_retry: true
    max_retries: 3
    initial_delay: 1.0  # seconds
    max_delay: 30.0  # seconds
    backoff_multiplier: 2.0
  
  fallback:
    enable_fallback: true
    fallback_strategy: graceful  # graceful, cached, default
  
  isolation:
    enable_isolation: true
    timeout_per_agent: 30.0

# ============================================================
# PERFORMANCE TUNING
# ============================================================
performance:
  enable_caching: true
  enable_compression: true
  enable_batching: true
  
  batch_size: 10
  batch_timeout: 5.0  # seconds
  
  parallel_workers: 4
  queue_size: 100

# ============================================================
# SECURITY CONFIGURATION
# ============================================================
security:
  enable_ssl: false
  ssl_cert_path: null
  ssl_key_path: null
  
  data_encryption:
    enabled: false
    algorithm: AES-256
  
  audit_logging:
    enabled: true
    log_file: ./logs/audit.log

# ============================================================
# INTEGRATIONS CONFIGURATION
# ============================================================
integrations:
  facebook_ads:
    enabled: false
    api_version: v12.0
    
  google_ads:
    enabled: false
    api_version: v11
    
  crm:
    enabled: false
    type: salesforce  # salesforce, hubspot, custom
    
  analytics:
    enabled: false
    type: google_analytics  # google_analytics, mixpanel, custom
